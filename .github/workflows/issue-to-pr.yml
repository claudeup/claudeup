name: Issue → PR → Review

# ─────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────
on:
  # Kick off implementation when a human assigns
  # the "claude" label to an issue
  issues:
    types: [labeled]

  # Auto-review every PR Claude opens (and
  # any subsequent push to that PR branch)
  pull_request:
    types: [opened, synchronize]
    branches: [main]

  # Allow ad-hoc @claude mentions inside PRs
  issue_comment:
    types: [created]

  # Weekly triage sweep for unlabeled/stale issues
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC

  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: true
      model:
        description: "Model to use"
        required: false
        default: "claude-sonnet-4-6"
        type: choice
        options:
          - claude-sonnet-4-6
          - claude-opus-4-6
      max_turns:
        description: "Max turns (default: 50 sonnet, 30 opus)"
        required: false

# ─────────────────────────────────────────────
# Global settings
# ─────────────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: false # don't kill an in-flight implementation

# ─────────────────────────────────────────────
# Job 1 – Implement an issue and open a PR
# ─────────────────────────────────────────────
jobs:
  implement:
    name: Implement issue & open PR
    runs-on: ubuntu-latest

    # Only run when:
    #   • an issue gets a claude label (claude, claude:opus, claude:sonnet), OR
    #   • manually dispatched
    if: |
      (github.event_name == 'issues' &&
       (github.event.label.name == 'claude' || startsWith(github.event.label.name, 'claude:'))) ||
      github.event_name == 'workflow_dispatch'

    permissions:
      contents: write # push branch
      pull-requests: write # open PR
      issues: write # add labels / comments
      id-token: write # OIDC token for claude-code-action OAuth

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Claude can read git log

      # gh CLI is pre-installed on ubuntu-latest; make sure it is auth'd
      - name: Authenticate gh CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Resolve model and max-turns from label
        id: config
        run: |
          LABEL="${{ github.event.label.name }}"
          case "$LABEL" in
            claude:opus)   MODEL="claude-opus-4-6";   DEFAULT_TURNS=30 ;;
            claude:sonnet) MODEL="claude-sonnet-4-6";  DEFAULT_TURNS=50 ;;
            *)             MODEL="${{ inputs.model || 'claude-sonnet-4-6' }}"
                           DEFAULT_TURNS=50 ;;
          esac
          # Manual override takes precedence
          TURNS="${{ inputs.max_turns }}"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "max_turns=${TURNS:-$DEFAULT_TURNS}" >> "$GITHUB_OUTPUT"

      - name: Implement issue with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model ${{ steps.config.outputs.model }} --max-turns ${{ steps.config.outputs.max_turns }}"
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)", "Grep(*)"]
              }
            }
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            commit-commands@claude-plugins-official
          prompt: |
            You are working inside the claudeup Go CLI repository.

            ## Task
            Implement the changes described in GitHub issue
            #${{ github.event.issue.number || inputs.issue_number }}.

            ## Steps you MUST follow (in order)
            1. Read the issue body and all comments carefully.
            2. Explore the relevant source files to understand the codebase.
            3. Implement the required changes following the project conventions
               in CLAUDE.md (if present).
            4. Add or update tests as appropriate.
            5. Run `go build ./...` and `go test ./...` — fix any failures
               before proceeding.
            6. Use the /commit-commands:commit-push-pr command to:
               - Create a feature branch named `claude/issue-${{ github.event.issue.number || inputs.issue_number }}-<slug>`
               - Commit all changes with a conventional commit message
               - Push the branch
               - Open a pull request against main with:
                   • Title referencing the issue (e.g. "fix: ...")
                   • Body that closes the issue (Closes #N) and includes
                     a brief summary + test plan
            7. Post the PR URL as a comment on the original issue.

            ## Constraints
            - Only touch files relevant to the issue.
            - Do NOT force-push or amend existing commits.
            - Do NOT merge the PR — leave it open for review.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Claude execution log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2 – Scheduled issue triage (weekly sweep)
  # ─────────────────────────────────────────────
  triage:
    name: Triage open issues
    runs-on: ubuntu-latest

    if: github.event_name == 'schedule'

    permissions:
      issues: write
      contents: read
      id-token: write # OIDC token for claude-code-action OAuth

    steps:
      - uses: actions/checkout@v4

      - name: Triage with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 10"
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Glob(*)", "Grep(*)"]
              }
            }
          prompt: |
            Triage all open issues in this repository.

            For each open issue:
            1. Apply ONE of these labels if not already set:
               - "bug"         – confirmed defect
               - "enhancement" – new feature / improvement
               - "question"    – needs clarification
               - "good first issue" – small, well-scoped, good for new contributors
               - "claude"      – ready to implement autonomously
            2. If the issue needs clarification, post a polite comment asking
               for the missing information.
            3. If an issue has had no activity for > 30 days AND is not labeled
               "claude", add the "stale" label and a comment explaining this.
            4. Do NOT close any issues.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 3 – Review every PR with pr-review-toolkit
  # ─────────────────────────────────────────────
  review:
    name: PR review (pr-review-toolkit)
    runs-on: ubuntu-latest

    # Run on any PR opened/updated against main
    # Bot-authored comments are handled by the fix-review job instead
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write # post review comments
      issues: write # reply to @claude mentions
      id-token: write # OIDC token for claude-code-action OAuth

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Review PR with Claude Code (pr-review-toolkit)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 20"
          allowed_bots: "claude"
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Glob(*)", "Grep(*)"]
              }
            }
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            pr-review-toolkit@claude-plugins-official
          prompt: |
            Run a comprehensive PR review using the pr-review-toolkit plugin.

            Execute: /pr-review-toolkit:review-pr all

            The review should cover all six dimensions:
            - **comments**  – accuracy of code comments vs implementation
            - **tests**     – coverage completeness and quality
            - **errors**    – silent failures and improper error handling
            - **types**     – Go type design and interface encapsulation
            - **code**      – style, idioms, and best practices (Effective Go)
            - **simplify**  – dead code and unnecessary complexity

            Post a single structured review comment on the PR summarising
            findings from all agents. Use inline suggestions where possible.
            Confidence-filter: only surface HIGH and MEDIUM confidence findings.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 4 – Fix review findings on @claude mention
  # ─────────────────────────────────────────────
  fix-review:
    name: Fix review findings
    runs-on: ubuntu-latest

    # Run when a human comments @claude on a PR
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.type != 'Bot'

    permissions:
      contents: write # push fixes to branch
      pull-requests: write # update PR
      issues: write # reply to comment
      id-token: write # OIDC token for claude-code-action OAuth

    steps:
      - name: Resolve PR branch
        id: pr
        run: |
          PR_NUM="${{ github.event.issue.number }}"
          BRANCH=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json headRefName -q .headRefName)
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Authenticate gh CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Fix review findings with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --max-turns 30"
          allowed_bots: "claude"
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)", "Grep(*)"]
              }
            }
          prompt: |
            You are working on PR #${{ steps.pr.outputs.number }} in the claudeup Go CLI repository.
            You are on branch `${{ steps.pr.outputs.branch }}`.

            A reviewer commented:
            ${{ github.event.comment.body }}

            ## Steps
            1. Read the PR diff and all review comments to understand the findings.
            2. Address each finding the reviewer mentioned.
            3. Run `go build ./...` and `go test ./...` -- fix any failures.
            4. Commit the fixes with a descriptive message.
            5. Push to the current branch.
            6. Reply on the PR summarizing what you fixed.

            ## Constraints
            - Only fix what was requested. Do not refactor unrelated code.
            - Do NOT force-push or amend existing commits.
            - Do NOT close or merge the PR.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Claude execution log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: claude-fix-review-log
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 7
